
name: Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy to server
        uses: appleboy/ssh-action@v1.0.0

        with:
          host: 52.140.112.238
          username: azureuser
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/azureuser/my-devops-site
            git fetch origin
            git reset --hard origin/main
            cp index.html /var/www/html/index.html

